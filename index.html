    <script>
      (function () {
        try {
          var root = document.documentElement;
          var storedResolved = localStorage.getItem('rmv_theme_resolved');
          var storedGuest = localStorage.getItem('rmv_theme_preference:guest');
          var preference = storedResolved || storedGuest;
          var resolved = preference === 'dark' || preference === 'light'
            ? preference
            : preference === 'system'
              ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
              : null;

          if (resolved) {
            root.dataset.theme = resolved;
            root.style.colorScheme = resolved;
            if (resolved === 'dark') {
              document.body.style.backgroundColor = '#090e13';
            }
          }
        } catch (error) {
          // Ignore storage or matchMedia failures and let React bootstrap theme normally.
        }
      })();
    </script>
