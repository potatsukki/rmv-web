name: Frontend CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    concurrency:
      group: vps-deploy-frontend
      cancel-in-progress: false
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 15m
          script_stop: true
          script: |
            set -e

            # ── Cross-repo deploy lock (mkdir is atomic) ──────────────
            LOCKDIR="/tmp/rmv-deploy.lock"
            cleanup() { rm -rf "$LOCKDIR"; }
            trap cleanup EXIT

            acquired=false
            for i in $(seq 1 60); do
              if mkdir "$LOCKDIR" 2>/dev/null; then acquired=true; break; fi
              if [ -d "$LOCKDIR" ]; then
                lock_age=$(( $(date +%s) - $(stat -c %Y "$LOCKDIR") ))
                if [ "$lock_age" -gt 900 ]; then
                  echo "Breaking stale lock (${lock_age}s old)"
                  rm -rf "$LOCKDIR"; mkdir "$LOCKDIR"; acquired=true; break
                fi
              fi
              echo "Waiting for deploy lock ($i/60)..."
              sleep 5
            done
            [ "$acquired" = true ] || { echo "Failed to acquire deploy lock"; exit 1; }
            echo "Deploy lock acquired"

            # ── Helper: wait for container health ─────────────────────
            wait_for_health() {
              local c="$1" retries="${2:-60}" delay="${3:-3}"
              for i in $(seq 1 "$retries"); do
                s=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$c" 2>/dev/null || true)
                echo "  [$i/$retries] $c -> $s"
                [ "$s" = "healthy" ] && return 0
                if [ "$s" = "unhealthy" ]; then
                  echo "!! $c is unhealthy — recent logs:"; docker logs --tail 30 "$c" 2>&1 || true; return 1
                fi
                sleep "$delay"
              done
              echo "Timeout waiting for $c"; docker logs --tail 30 "$c" 2>&1 || true; return 1
            }

            # ── Clone repos (first-time only) ────────────────────────
            mkdir -p /opt/rmv
            [ -d /opt/rmv/rmv-server/.git ] || git clone https://github.com/potatsukki/rmv-server.git /opt/rmv/rmv-server
            [ -d /opt/rmv/rmv-web/.git ]    || git clone https://github.com/potatsukki/rmv-web.git    /opt/rmv/rmv-web

            # ── Pull latest code ──────────────────────────────────────
            echo "Pulling latest code..."
            git -C /opt/rmv/rmv-server fetch --all && git -C /opt/rmv/rmv-server reset --hard origin/main
            git -C /opt/rmv/rmv-web    fetch --all && git -C /opt/rmv/rmv-web    reset --hard origin/main

            # ── Tear down & rebuild ───────────────────────────────────
            cd /opt/rmv/rmv-server/deploy
            echo "Stopping existing containers..."
            docker compose -f docker-compose.prod.yml down --remove-orphans

            echo "Building and starting services..."
            docker compose -f docker-compose.prod.yml up -d --build api web nginx certbot

            # ── Health checks ─────────────────────────────────────────
            echo "Waiting for health checks..."
            wait_for_health rmv-api 60 3
            wait_for_health rmv-web 40 3

            # ── Smoke tests ───────────────────────────────────────────
            echo "Running smoke tests..."
            docker exec rmv-nginx wget -qO/dev/null --tries=2 --spider http://api:5000/api/v1/health
            docker exec rmv-nginx wget -qO/dev/null --tries=2 --spider http://web/

            echo "Deploy successful"
            docker compose -f docker-compose.prod.yml ps
            docker image prune -f
