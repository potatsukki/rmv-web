name: Frontend CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  deploy:
    name: Deploy Frontend (Zero-Downtime)
    runs-on: ubuntu-latest
    needs: ci
    concurrency:
      group: vps-deploy-web
      cancel-in-progress: true
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 15m
          script_stop: false
          script: |
            echo "========== FRONTEND DEPLOY START =========="

            # ── Pull latest frontend code ─────────────────────────────
            mkdir -p /opt/rmv
            if [ ! -d /opt/rmv/rmv-web/.git ]; then
              git clone https://github.com/potatsukki/rmv-web.git /opt/rmv/rmv-web
            fi
            if [ ! -d /opt/rmv/rmv-server/.git ]; then
              git clone https://github.com/potatsukki/rmv-server.git /opt/rmv/rmv-server
            fi

            cd /opt/rmv/rmv-web
            git fetch --all
            git reset --hard origin/main
            echo "Frontend commit: $(git log --oneline -1)"

            # ── Build new image (old container still serves traffic) ──
            cd /opt/rmv/rmv-server/deploy
            echo "Building new web image..."
            docker compose -f docker-compose.prod.yml build --no-cache web
            BUILD_EXIT=$?
            if [ "$BUILD_EXIT" -ne 0 ]; then
              echo "FATAL: Docker build failed with exit code $BUILD_EXIT"
              exit 1
            fi
            echo "Build succeeded"

            # ── Swap container (near-instant) ─────────────────────────
            echo "Swapping web container..."
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate web
            sleep 5

            # ── Health check ──────────────────────────────────────────
            echo "Waiting for healthy..."
            for i in $(seq 1 40); do
              STATUS=$(docker inspect -f '{{.State.Health.Status}}' rmv-web 2>/dev/null || echo "starting")
              echo "  [$i/40] rmv-web -> $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                break
              fi
              if [ "$STATUS" = "unhealthy" ]; then
                echo "Container is unhealthy!"
                docker logs --tail 20 rmv-web 2>&1 || true
                break
              fi
              sleep 3
            done

            # ── Reload nginx ──────────────────────────────────────────
            docker exec rmv-nginx nginx -s reload 2>/dev/null || true

            # ── Cleanup ───────────────────────────────────────────────
            docker image prune -f 2>/dev/null || true
            docker compose -f docker-compose.prod.yml ps 2>/dev/null || true

            echo "========== FRONTEND DEPLOY COMPLETE =========="
            exit 0
