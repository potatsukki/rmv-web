name: Frontend CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  deploy:
    name: Blue-Green Deploy (Frontend)
    runs-on: ubuntu-latest
    needs: ci
    concurrency:
      group: vps-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 15m
          script_stop: false
          script: |
            echo "========== FRONTEND BLUE-GREEN DEPLOY =========="

            # ── Ensure repos exist ────────────────────────────────────
            mkdir -p /opt/rmv
            if [ ! -d /opt/rmv/rmv-web/.git ]; then
              git clone https://github.com/potatsukki/rmv-web.git /opt/rmv/rmv-web
            fi
            if [ ! -d /opt/rmv/rmv-server/.git ]; then
              git clone https://github.com/potatsukki/rmv-server.git /opt/rmv/rmv-server
            fi

            # ── Pull latest code ──────────────────────────────────────
            cd /opt/rmv/rmv-web
            git fetch --all
            git reset --hard origin/main
            echo "Frontend commit: $(git log --oneline -1)"

            # Also pull server (has deploy scripts + compose file)
            cd /opt/rmv/rmv-server
            git fetch --all
            git reset --hard origin/main

            # ── Run blue-green deploy ─────────────────────────────────
            chmod +x /opt/rmv/rmv-server/deploy/scripts/blue-green-deploy.sh
            /opt/rmv/rmv-server/deploy/scripts/blue-green-deploy.sh web

            echo "========== FRONTEND DEPLOY DONE =========="
            exit 0
