name: Frontend CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  ci:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  image:
    name: Publish Frontend Image
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_repo=${{ env.REGISTRY }}/$owner_lc/rmv-web" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Blue-Green Deploy (Frontend)
    runs-on: ubuntu-latest
    needs: [ci, image]
    concurrency:
      group: vps-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 15m
          script_stop: false
          script: |
            echo "========== FRONTEND BLUE-GREEN DEPLOY =========="

            # ── Ensure repos exist ────────────────────────────────────
            mkdir -p /opt/rmv
            if [ ! -d /opt/rmv/rmv-web/.git ]; then
              git clone https://github.com/potatsukki/rmv-web.git /opt/rmv/rmv-web
            fi
            if [ ! -d /opt/rmv/rmv-server/.git ]; then
              git clone https://github.com/potatsukki/rmv-server.git /opt/rmv/rmv-server
            fi

            # ── Pull latest code ──────────────────────────────────────
            cd /opt/rmv/rmv-web
            git fetch --all
            git reset --hard origin/main
            echo "Frontend commit: $(git log --oneline -1)"

            # Also pull server (has deploy scripts + compose file)
            cd /opt/rmv/rmv-server
            git fetch --all
            git reset --hard origin/main

            # ── Run blue-green deploy ─────────────────────────────────
            chmod +x /opt/rmv/rmv-server/deploy/scripts/blue-green-deploy.sh
            export RMV_WEB_IMAGE='${{ needs.image.outputs.image_repo }}'
            export RMV_IMAGE_TAG='${{ needs.image.outputs.image_tag }}'
            if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.GHCR_USERNAME }}' --password-stdin
            fi
            /opt/rmv/rmv-server/deploy/scripts/blue-green-deploy.sh web

            echo "========== FRONTEND DEPLOY DONE =========="
            exit 0
