name: Frontend CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  deploy:
    name: Deploy Frontend (Zero-Downtime)
    runs-on: ubuntu-latest
    needs: ci
    concurrency:
      group: vps-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 15m
          script_stop: false
          script: |
            set -e

            echo "========== FRONTEND DEPLOY START =========="

            # ── Cross-repo deploy lock (mkdir is atomic) ──────────────
            LOCKDIR="/tmp/rmv-deploy.lock"
            cleanup() { rm -rf "$LOCKDIR" 2>/dev/null; }
            trap cleanup EXIT

            acquired=false
            for i in $(seq 1 60); do
              if mkdir "$LOCKDIR" 2>/dev/null; then acquired=true; break; fi
              if [ -d "$LOCKDIR" ]; then
                lock_age=$(( $(date +%s) - $(stat -c %Y "$LOCKDIR") ))
                if [ "$lock_age" -gt 900 ]; then
                  echo "Breaking stale lock (${lock_age}s old)"
                  rm -rf "$LOCKDIR"
                  mkdir "$LOCKDIR"
                  acquired=true
                  break
                fi
              fi
              echo "Waiting for deploy lock ($i/60)..."
              sleep 5
            done
            if [ "$acquired" != "true" ]; then
              echo "FATAL: Failed to acquire deploy lock after 5 minutes"
              exit 1
            fi
            echo "Deploy lock acquired"

            # ── Helper: wait for container health ─────────────────────
            wait_for_health() {
              local c="$1"
              local retries="${2:-60}"
              local delay="${3:-3}"
              local i=1
              while [ "$i" -le "$retries" ]; do
                local s=""
                s=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$c" 2>/dev/null) || s="not-found"
                echo "  [$i/$retries] $c -> $s"
                if [ "$s" = "healthy" ]; then
                  return 0
                fi
                if [ "$s" = "unhealthy" ]; then
                  echo "!! $c is unhealthy — recent logs:"
                  docker logs --tail 30 "$c" 2>&1 || true
                  return 1
                fi
                sleep "$delay"
                i=$((i + 1))
              done
              echo "Timeout waiting for $c"
              docker logs --tail 30 "$c" 2>&1 || true
              return 1
            }

            # ── Clone repos (first-time only) ─────────────────────────
            mkdir -p /opt/rmv
            [ -d /opt/rmv/rmv-web/.git ] || git clone https://github.com/potatsukki/rmv-web.git /opt/rmv/rmv-web
            [ -d /opt/rmv/rmv-server/.git ] || git clone https://github.com/potatsukki/rmv-server.git /opt/rmv/rmv-server

            # ── Pull ONLY frontend code ───────────────────────────────
            echo ">>> Pulling latest frontend code..."
            git -C /opt/rmv/rmv-web fetch --all
            git -C /opt/rmv/rmv-web reset --hard origin/main
            echo "Frontend code pulled: $(git -C /opt/rmv/rmv-web log --oneline -1)"

            # ── Build new image WHILE old container keeps serving ─────
            cd /opt/rmv/rmv-server/deploy
            echo ">>> Building new web image (old container still running)..."
            docker compose -f docker-compose.prod.yml build --no-cache web
            echo ">>> Build complete"

            # ── Swap container (near-instant) ─────────────────────────
            echo ">>> Swapping web container..."
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate web
            echo ">>> Container swapped, waiting 5s for startup..."
            sleep 5

            # ── Health check ──────────────────────────────────────────
            echo ">>> Running health check..."
            wait_for_health rmv-web 40 3
            echo ">>> Health check passed"

            # ── Reload nginx so it resolves new container IP ──────────
            echo ">>> Reloading nginx..."
            docker exec rmv-nginx nginx -s reload 2>&1 || true

            # ═══ Non-critical cleanup (don't fail deploy) ═════════════
            set +e
            echo ">>> Smoke test..."
            docker exec rmv-nginx wget -qO/dev/null --tries=3 --timeout=5 --spider http://web/ 2>&1
            echo ">>> Container status:"
            docker compose -f docker-compose.prod.yml ps 2>&1
            echo ">>> Pruning old images..."
            docker image prune -f 2>&1

            echo "========== FRONTEND DEPLOY SUCCESS =========="
            exit 0
